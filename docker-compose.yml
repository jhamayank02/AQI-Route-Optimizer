name: AQI_Route_Optimizer

services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  client:
    build:
      context: ./client
    container_name: client
    ports:
    - "80:80"
    depends_on:
      - server
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: deployment/Dockerfile
    container_name: server
    ports:
    - "8000:8000"
    env_file:
      - ./server/.env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
